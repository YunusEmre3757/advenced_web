services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: seismic_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: seismic
      POSTGRES_USER: seismic
      POSTGRES_PASSWORD: seismic_dev_only
    ports:
      - "5432:5432"
    volumes:
      - seismic_pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seismic -d seismic"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  seismic_pgdata:
