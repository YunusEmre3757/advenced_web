collect_data_task:
  description: >
    FOCUS EVENT:
      - ID        : {event_id}
      - Location  : {event_location}
      - Magnitude : M{event_magnitude}
      - Depth     : {event_depth_km} km
      - Coords    : lat={event_latitude}, lon={event_longitude}

    Real data fetched from the backend by Python (already done for you):

    {nearby_events_context}

    Your job:
      1. Read the block above (it is real KOERI data).
      2. Produce a 2–3 sentence Turkish summary describing the current
         seismic context around this epicenter: how many nearby events,
         largest magnitude, how many within 30 km, depth pattern.
      3. Do NOT invent event counts, magnitudes, or distances — copy
         the numbers from the block above. If the block says "Toplam
         yakın olay: 7", your summary must say 7, not 5 or 12.

    Write in Turkish. 2–3 sentences maximum. No bullet lists.

  expected_output: >
    ## DATA_COLLECTOR_SUMMARY
    2–3 sentence Turkish paragraph summarising the nearby seismic activity,
    using ONLY the numbers from the injected nearby_events_context block.
  agent: data_collector


fault_analysis_task:
  description: >
    FOCUS EVENT: {event_location} (M{event_magnitude}, depth {event_depth_km} km,
    lat={event_latitude}, lon={event_longitude})

    ═══════════════════════════════════════════════════════════════════
    REAL DATA (pre-computed by Python — do NOT second-guess these):
    ═══════════════════════════════════════════════════════════════════

    {nearest_faults_context}

    {usgs_historical_context}

    ═══════════════════════════════════════════════════════════════════

    Your job — write an interpretation, NOT re-derive the numbers.

    The hard facts are already computed:
      - HAZARD_LEVEL        = {real_hazard_level}
      - NEAREST_FAULT       = {real_nearest_fault_name}
      - DISTANCE_KM         = {real_nearest_fault_distance_km}
      - FAULT_TYPE          = {real_nearest_fault_type}
      - SLIP_RATE           = {real_nearest_fault_slip_rate}

    You must:
      1. Echo those 5 scalars verbatim under the section headers below.
         Do not change the fault name. Do not re-estimate the distance.
         Do not recalculate the hazard level — the thresholds are already
         applied (<5 CRITICAL, <15 HIGH, <35 MODERATE, ≥35 LOW).

      2. Copy the TOP_5_FAULTS block as a markdown table by reading the
         "Top-5 yakın fay" list in the injected context.

      3. Copy HISTORICAL_SUMMARY, SEISMIC_GAP_STATUS, and SEISMIC_GAP_NOTE
         exactly as they appear in the USGS block. One character change
         to the dates or magnitudes is a failure.

      4. Write a 4–5 sentence INTERPRETATION in Turkish covering:
         - Which fault dominates and why (given its type and slip rate)
         - How the focus event relates to that fault geometrically
         - What the historical record says about recurrence in this area
         - What the seismic-gap status implies operationally
         - End with EXACTLY this disclaimer:
           "Bu yorum mevcut veriye dayalıdır. Kesin risk değerlendirmesi
           için AFAD/KOERI uzmanlarına başvurunuz."

    Forbidden:
      - Inventing fault names not in the injected list
      - Changing the computed distance or hazard level
      - Substituting your own historical dates

  expected_output: >
    A structured report with these exact sections (markdown ## headers):
      HAZARD_LEVEL         — single word from the injected data
      NEAREST_FAULT        — copied verbatim
      DISTANCE_KM          — copied verbatim
      FAULT_TYPE           — copied verbatim
      SLIP_RATE            — copied verbatim
      TOP_5_FAULTS         — markdown table (fault | dist_km | type | slip_rate)
      HISTORICAL_SUMMARY   — copied verbatim from USGS block
      SEISMIC_GAP_STATUS   — copied verbatim
      SEISMIC_GAP_NOTE     — copied verbatim
      INTERPRETATION       — 4–5 sentence Turkish narrative + disclaimer
  agent: fault_analyst


risk_assessment_task:
  description: >
    FOCUS EVENT: {event_location} (M{event_magnitude},
    lat={event_latitude}, lon={event_longitude})

    ═══════════════════════════════════════════════════════════════════
    REAL DATA (pre-computed by Python):
    ═══════════════════════════════════════════════════════════════════

    {soil_class_context}

    Fault proximity hazard from previous task: {real_hazard_level}
    Nearest fault: {real_nearest_fault_name} ({real_nearest_fault_distance_km} km)

    ═══════════════════════════════════════════════════════════════════

    Your job:
      1. Echo the soil class verbatim (SOIL_CLASS = {real_soil_class}).
         Do NOT replace it with your own guess.

      2. Compute a composite RISK_SCORE on a 1–10 scale using this formula:
           base_mag_score:
             M<3   → 1
             3≤M<4 → 3
             4≤M<5 → 5
             5≤M   → 7
           soil_bonus:
             ZA, ZB → 0
             ZC     → +1
             ZD     → +2
             ZE     → +3
             ZF     → +4
           fault_bonus:
             LOW      → 0
             MODERATE → +1
             HIGH     → +2
             CRITICAL → +3
           RISK_SCORE = base_mag_score + soil_bonus + fault_bonus (cap at 10)

         Show the arithmetic in one line: e.g. "5 + 2 + 2 = 9".

      3. Map RISK_SCORE → RISK_LEVEL:
           ≤3 LOW, 4–5 MODERATE, 6–8 HIGH, ≥9 CRITICAL

      4. Recommend 3 concrete public-safety actions in Turkish, specific
         to the soil class and the distance from the nearest fault.
         No generic advice — tailor to the real numbers.

      5. Write a 2-sentence Turkish PUBLIC_SUMMARY a citizen can understand.

  expected_output: >
    Structured markdown report with these exact sections:
      SOIL_CLASS           — copied verbatim (do not change)
      RISK_SCORE           — number 1–10 with arithmetic shown
      RISK_LEVEL           — LOW / MODERATE / HIGH / CRITICAL
      SAFETY_ACTIONS       — numbered list of 3 Turkish actions
      PUBLIC_SUMMARY       — 2 sentences in Turkish
      RISK_ASSESSOR_REPORT — 2–3 sentence synthesis combining soil +
                             fault distance + magnitude, in Turkish
  agent: risk_assessor
  context:
    - fault_analysis_task


write_report_task:
  description: >
    Compile a final structured report for the focus earthquake:
    {event_location} (M{event_magnitude}, lat={event_latitude},
    lon={event_longitude}).

    Ground truth scalars (these are computed, not opinions):
      HAZARD_LEVEL  = {real_hazard_level}
      NEAREST_FAULT = {real_nearest_fault_name}
      DISTANCE_KM   = {real_nearest_fault_distance_km}
      FAULT_TYPE    = {real_nearest_fault_type}
      SOIL_CLASS    = {real_soil_class}

    The output MUST use these exact section headers, in this order:

    ## HAZARD_LEVEL
    (single word — echo {real_hazard_level})

    ## NEAREST_FAULT
    (echo {real_nearest_fault_name})

    ## DISTANCE_KM
    (echo {real_nearest_fault_distance_km})

    ## FAULT_TYPE
    (echo {real_nearest_fault_type})

    ## SOIL_CLASS
    (echo {real_soil_class})

    ## RISK_SCORE
    (number 1–10 from risk_assessor)

    ## DATA_COLLECTOR_SUMMARY
    (Turkish paragraph from data_collector, copied as-is)

    ## FAULT_ANALYST_REPORT
    (3–4 sentence Turkish narrative distilled from fault_analyst's
    INTERPRETATION section. Do NOT restate the numbers — just the
    geological reasoning. End with the AFAD/KOERI disclaimer.)

    ## RISK_ASSESSOR_REPORT
    (2–3 sentence Turkish narrative distilled from risk_assessor's
    PUBLIC_SUMMARY + SAFETY_ACTIONS. Focus on what residents should do.)

    ## FINAL_REPORT
    Write ONE bilingual executive summary.
    Structure: Turkish paragraph first (≈4 sentences), then English
    paragraph (≈4 sentences). Cover: event details, fault context,
    soil behaviour, hazard level, citizen guidance, and official
    disclaimer. Do NOT repeat the other sections verbatim — synthesise.
    150–250 words total.

    ## CONFIDENCE_LEVEL
    (LOW / MEDIUM / HIGH based on: was real fault data available?
    was real soil data available? was USGS historical data available?
    HIGH = all three; MEDIUM = two; LOW = one or none.)

    Save as report.md.

  expected_output: >
    A markdown document with the exact section headers above, saved as
    report.md. The FINAL_REPORT section is bilingual, 150–250 words, and
    does not duplicate the upstream agent reports.
  agent: report_writer
  context:
    - collect_data_task
    - fault_analysis_task
    - risk_assessment_task
  output_file: report.md
