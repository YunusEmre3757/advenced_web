<nav class="nav">
    <div class="nav-brand" routerLink="/">
        <div class="nav-brand-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12Z"
                    stroke="white" stroke-width="1.5" />
                <path d="M7 15L10 10L13 13L16 9" stroke="white" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </div>
        <span class="nav-brand-name">Deprem<span>Rehberim</span></span>
    </div>

    <div class="nav-menu">
        <a class="nav-item" routerLink="/dashboard" routerLinkActive="nav-item--active"
            [routerLinkActiveOptions]="{exact:true}">Ana Sayfa</a>
        <a class="nav-item" routerLink="/map" routerLinkActive="nav-item--active">Deprem Haritası</a>
        <a class="nav-item" routerLink="/safety-guide" routerLinkActive="nav-item--active">Rehber</a>
        <a class="nav-item" routerLink="/building-risk" routerLinkActive="nav-item--active">Bina Risk</a>
        <a class="nav-item" routerLink="/historical-map" routerLinkActive="nav-item--active">Tarihsel</a>
        <a class="nav-item" routerLink="/heatmap" routerLinkActive="nav-item--active">Yogunluk</a>
        <a class="nav-item" routerLink="/mcp-demo" routerLinkActive="nav-item--active">MCP</a>
        @if (isAuthenticated()) {
            <a class="nav-item" routerLink="/profile" routerLinkActive="nav-item--active">Profil</a>
        }
        <a class="nav-item" routerLink="/ai-assistant" routerLinkActive="nav-item--active">AI Asistan</a>
        @if (isAuthenticated()) {
            <a class="nav-item nav-item--safety" routerLink="/safety" routerLinkActive="nav-item--active">Guvendeyim</a>
        }
    </div>

    <div class="nav-end">
        <button class="nav-icon-btn" title="Bildirimler">
            <span class="nav-icon-btn__dot"></span>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
        </button>

        <div class="nav-separator"></div>

        @if (isAuthenticated()) {
            <div class="nav-user">
                <div class="nav-user__meta">
                    <span class="nav-user__name">{{ user()?.displayName || user()?.email }}</span>
                    <span class="nav-user__role">Hesap</span>
                </div>
                <button class="nav-auth-btn" type="button" (click)="logout()">Çıkış</button>
            </div>
        } @else {
            <a class="nav-auth-btn" routerLink="/login">Giriş</a>
            <a class="nav-auth-btn nav-auth-btn--primary" routerLink="/register">Kayıt Ol</a>
        }
    </div>
</nav>
