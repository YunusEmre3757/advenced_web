<section class="auth-shell">
  <div class="auth-card">
    <header>
      <h1>Kayıt Ol</h1>
      <p class="muted">Hesabınızı oluşturun ve konumunuza özel uyarılar alın.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label>
        <span>Görünen ad (opsiyonel)</span>
        <input type="text" formControlName="displayName" autocomplete="name" maxlength="120">
      </label>

      <label>
        <span>E-posta</span>
        <input type="email" formControlName="email" autocomplete="email" required>
      </label>

      <label>
        <span>Şifre (en az 8 karakter)</span>
        <input type="password" formControlName="password" autocomplete="new-password" required>
      </label>

      @if (error(); as msg) {
        <p class="error" role="alert">{{ msg }}</p>
      }

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Kayıt oluşturuluyor…' : 'Kayıt Ol' }}
      </button>
    </form>

    <p class="auth-switch">
      Zaten hesabın var mı? <a routerLink="/login">Giriş yap</a>
    </p>
  </div>
</section>
