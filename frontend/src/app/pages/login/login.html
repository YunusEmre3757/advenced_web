<section class="auth-shell">
  <div class="auth-card">
    <header>
      <h1>Giriş Yap</h1>
      <p class="muted">Seismic Command hesabınıza erişin.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label>
        <span>E-posta</span>
        <input type="email" formControlName="email" autocomplete="email" required>
      </label>

      <label>
        <span>Şifre</span>
        <input type="password" formControlName="password" autocomplete="current-password" required>
      </label>

      @if (error(); as msg) {
        <p class="error" role="alert">{{ msg }}</p>
      }

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Giriş yapılıyor…' : 'Giriş Yap' }}
      </button>
    </form>

    <p class="auth-switch">
      Hesabın yok mu? <a routerLink="/register">Kayıt ol</a>
    </p>
  </div>
</section>
