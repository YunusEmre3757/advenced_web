spring.application.name=backend

# PostgreSQL datasource (Docker: docker-compose up -d postgres)
spring.datasource.url=jdbc:postgresql://localhost:5432/seismic
spring.datasource.username=seismic
spring.datasource.password=seismic_dev_only
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — Flyway owns the schema; Hibernate only validates.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=app
spring.jpa.open-in-view=false

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.default-schema=app
spring.flyway.schemas=app
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT auth
security.jwt.secret=${JWT_SECRET:dev-secret-change-me-please-at-least-32-bytes-long-for-hs256-ok}
security.jwt.expiration-minutes=1440
security.jwt.issuer=seismic-command

# Kandilli (KOERI) latest earthquakes
earthquake.kandilli.base-url=http://www.koeri.boun.edu.tr/scripts/lst9.asp

# Server-Sent Events live feed cadence
feed.earthquakes.interval-seconds=30

# Location-based earthquake notifications
notifications.earthquake.enabled=true
notifications.earthquake.scan-interval-ms=30000
notifications.earthquake.initial-delay-ms=15000
notifications.earthquake.lookback-hours=2
notifications.earthquake.fetch-limit=100
notifications.earthquake.graph-routing.enabled=true

# Pushover integration. Without PUSHOVER_APP_TOKEN, deliveries are recorded as DRY_RUN.
pushover.api-url=https://api.pushover.net/1/messages.json
pushover.app-token=${PUSHOVER_APP_TOKEN:}

# Resend email integration. Without RESEND_API_KEY, deliveries are recorded as DRY_RUN.
resend.api-url=https://api.resend.com/emails
resend.api-key=${RESEND_API_KEY:}
resend.from-address=${RESEND_FROM:Seismic Command <onboarding@resend.dev>}

# Turkey bounding box
earthquake.turkey.min-lat=35.0
earthquake.turkey.max-lat=43.0
earthquake.turkey.min-lon=25.0
earthquake.turkey.max-lon=45.0

# MTA active fault lines GeoJSON source
faults.mta.geojson-path=classpath:data/turkey_active_faults.geojson
faults.viewport.expand-deg=0.6

# Soil site classes (ZA-ZF / Vs30)
soil.zones.geojson-path=classpath:data/turkey_soil_site_classes.geojson
soil.zones.viewport.expand-deg=0.1

# Address geocoding (Nominatim / OpenStreetMap)
geocode.nominatim.base-url=https://nominatim.openstreetmap.org
geocode.nominatim.user-agent=${GEOCODE_USER_AGENT:SeismicCommand/1.0 (contact: local-dev)}
geocode.nominatim.timeout-seconds=12

# LangGraph orchestration service (FastAPI, Python)
graph.service.url=${GRAPH_SERVICE_URL:http://localhost:8002}
graph.service.timeout-seconds=60

# CrewAI multi-agent service (FastAPI, Python)
crew.service.url=http://localhost:8001
crew.service.timeout-seconds=180
crew.service.cache-ttl-seconds=3600

# Groq AI integration
ai.groq.api-url=https://api.groq.com/openai/v1/chat/completions
ai.groq.model=llama-3.3-70b-versatile
# API key via environment variable (GROQ_API_KEY) - never commit real keys!
ai.groq.api-key=${GROQ_API_KEY:}
ai.groq.timeout-seconds=25
ai.groq.temperature=0.2
ai.groq.max-tokens=700
