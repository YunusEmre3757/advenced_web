spring.application.name=backend

# Kandilli (KOERI) latest earthquakes
earthquake.kandilli.base-url=http://www.koeri.boun.edu.tr/scripts/lst9.asp

# Turkey bounding box
earthquake.turkey.min-lat=35.0
earthquake.turkey.max-lat=43.0
earthquake.turkey.min-lon=25.0
earthquake.turkey.max-lon=45.0

# MTA active fault lines GeoJSON source
faults.mta.geojson-path=classpath:data/turkey_active_faults.geojson
faults.viewport.expand-deg=0.6

# Soil site classes (ZA-ZF / Vs30)
soil.zones.geojson-path=classpath:data/turkey_soil_site_classes.geojson
soil.zones.viewport.expand-deg=0.1

# Groq AI integration
ai.groq.api-url=https://api.groq.com/openai/v1/chat/completions
ai.groq.model=llama-3.3-70b-versatile
# API key via environment variable (GROQ_API_KEY) - never commit real keys!
ai.groq.api-key=${GROQ_API_KEY:your_groq_api_key_here}
ai.groq.timeout-seconds=25
ai.groq.temperature=0.2
ai.groq.max-tokens=700
